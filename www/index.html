<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hashing Demo</title>
    <style>
        body { font-family: monospace; padding: 2rem; }
        table { border-collapse: collapse; margin-top: 1rem; width: 100%; }
        th, td { border: 1px solid #ccc; padding: 0.5rem 1rem; text-align: left; }
        th { background: #f0f0f0; }
        .fast { color: green; font-weight: bold; }
        .slow { color: red; }
        h3 { margin-top: 2rem; }
    </style>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<h2>SHA-256 Demo – WASM vs. JS</h2>
<p>
    <input type="file" id="fileInput" accept=".txt">
</p>

<p><strong>Input:</strong> <span id="input">...</span></p>

<h3>Tid</h3>
<table>
    <thead>
        <tr>
            <th>Implementation</th>
            <th>Time elapsed</th>
        </tr>
    </thead>
    <tbody>
        <tr>
            <td>🦀 Rust / WASM</td>
            <td><span id="time-wasm">–</span></td>
        </tr>
        <tr>
            <td>🟨 JavaScript (Web Crypto API)</td>
            <td><span id="time-js">–</span></td>
        </tr>
    </tbody>
</table>

<h3>Resultater</h3>
<table>
    <thead>
        <tr>
            <th>Ord</th>
            <th>WASM Hash</th>
            <th>JS Hash</th>
            <th>Match</th>
        </tr>
    </thead>
    <tbody id="results-body"></tbody>
</table>

<script type="module" src="main.js"></script>
</body>
</html>
